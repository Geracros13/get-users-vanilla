<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Explore our user directory featuring real-time search, alphabetical filters, and smooth pagination. Powered by the DummyJSON API."
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="data.js" defer></script>
    <title>Users</title>
  </head>
  <body>
    <header>
      <h1>Get Users</h1>
    </header>
    <main>
      <div class="container-search">
        <input
          type="text"
          id="searchInput"
          class="search-bar"
          placeholder="Search by name or username..."
        />
        <button class="btn-primary" id="btnSearch" type="submit">Search</button>
      </div>
      <div class="container-filters">
        <button class="filter-btn" id="btnAZ">A-Z</button>
        <button class="filter-btn" id="btnState">Filter by State</button>
      </div>
      <div class="container-cards" id="cardsContainer">
        <div class="container-card">
          <img
            class="card-img"
            src="https://dummyjson.com/icon/emilys/128"
            alt="Hero image"
          />
          <div class="items-card">
            <p><strong>Name:</strong></p>
            <p><strong>Username:</strong></p>
            <p><strong>Phone Number:</strong></p>
            <p><strong>Address:</strong></p>
          </div>
        </div>
      </div>
      <div class="pagination-container">
        <button id="btnPrev" class="filter-btn">Previous</button>
        <span id="pageNumber">Page 1</span>
        <button id="btnNext" class="filter-btn">Next</button>
      </div>
    </main>
  </body>
</html>
